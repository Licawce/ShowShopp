services:
  - type: web
    name: showsystem
    env: python
    buildCommand: "./build.sh"
    startCommand: "./start.sh"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: showsystem-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DISABLE_COLLECTSTATIC
        value: "0"

databases:
  - name: showsystem-db
    databaseName: showsystem
    user: showsystem
    plan: free
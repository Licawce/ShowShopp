{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Страница не найдена | ShowShop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="dark-theme">

    <header class="header">
        <div class="header-inner">
            <a href="/" class="logo">
                <div class="logo-icon"><img src="{% static 'images/logo.svg' %}"></div>
                <span>ShowShop</span>
            </a>
            <nav class="nav">
                <a href="/">Главная</a>
                <a href="/catalog/">Каталог</a>
                <a href="/about/">О нас</a>
                <a href="/contacts/">Контакты</a>
            </nav>
        </div>
    </header>

    <main>
        <section style="min-height: 70vh; display: flex; align-items: center; justify-content: center;">
            <div style="text-align: center; padding: 40px 20px;">
                <div style="font-size: 8rem; font-weight: 800; color: var(--primary); line-height: 1; margin-bottom: 16px; letter-spacing: -4px;">
                    404
                </div>
                <h1 style="font-size: 2rem; font-weight: 700; margin-bottom: 12px; color: var(--text-primary);">
                    Страница не найдена
                </h1>
                <p style="color: var(--text-muted); font-size: 1.05rem; max-width: 420px; margin: 0 auto 36px;">
                    Такой страницы не существует или она была перемещена. Проверьте адрес или вернитесь на главную.
                </p>
                <div style="display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;">
                    <a href="/" class="btn btn-primary btn-lg">На главную</a>
                    <a href="/catalog/" class="btn btn-outline btn-lg">Каталог товаров</a>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 ShowShop. Все права защищены.</p>
            </div>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            const body = document.body;
            if (savedTheme === 'light') {
                body.classList.add('light-theme');
                body.classList.remove('dark-theme');
            } else {
                body.classList.add('dark-theme');
                body.classList.remove('light-theme');
            }
        });
    </script>
</body>
</html>
